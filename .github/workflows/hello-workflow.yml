name: Hello Workflow
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
 
jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Print a greeting
        run: echo "Hello from GitHub Actions!"
 
      - name: Show who triggered the workflow
        run: echo "Triggered by ${{ github.actor }}"
 
      - name: Show system information
        run: |
          echo "Operating system: $(uname -s)"
          echo "Kernel version: $(uname -r)"
          echo "Machine name: $(hostname)"
          echo "Current directory: $(pwd)"
          echo "Date and time: $(date)"

      - name: Show which event triggered this run
        run: |
          echo "This workflow was triggered by: ${{ github.event_name }}"
          echo "On the repository: ${{ github.repository }}"
          echo "By user: ${{ github.actor }}"
          echo "Ref (branch or tag): ${{ github.ref }}"